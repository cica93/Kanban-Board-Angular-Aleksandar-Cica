@if (user$ | async; as user) {
  <div class="app-header fixed top-0 right-0 flex mb-3 align-items-center w-full h-3rem gap-5 bg-primary px-5 text-white text-lg">
    <p-avatar class="cursor-pointer" [label]="user.fullName | slice: 0:1" [shape]="'circle'" [size]="'normal'" />
    <div class="flex gap-2">
      @for(link of ['rest', 'graphql', 'users']; track link) {
        <a [routerLink]="['/' + link]" routerLinkActive="router-link-active" >{{ link | titlecase }}</a>
      }
    </div>
    <i id="logout-icon" class="pi pi-sign-out ml-auto cursor-pointer" pTooltip="Logout" (click)="logout()"></i>
  </div>
  <div style="margin-top: 60px;">
    <router-outlet />
  </div>
    <p-dialog
      [visible]="showDialog()"
      (visibleChange)="dialogVisibleChange($event)"
      (hide)="showDialog.set(false)"
      [blockScroll]="true"
      [focusOnShow]="false"
      [closeOnEscape]="true"
      [draggable]="true"
      styleClass="w-4 fixed top-0 right-0 m-0"
      [style]="{ height:'100vh'}"
>
    <ng-template pTemplate="header">
        <span class="font-semibold text-xl">{{ modalHeader | async}}</span>
      </ng-template>
     <router-outlet (activate)="onSidebarActivate($event)" (deactivate)="showDialog.set(false)" name="sidebar" />
    </p-dialog>
} @else {
  <router-outlet />
}
<p-toast position="top-right" key="main" />
