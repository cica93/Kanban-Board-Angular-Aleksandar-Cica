<div class="flex justify-content-center flex-column align-items-center h-screen">
  <div class="form flex flex-column w-3 md:w-4 sm:w-6">    
    <form class="form flex flex-column gap-3" [formRoot]="loginForm">
      <h1 class="text-center">Login</h1>    
      <app-form-value-wrapper [label]="'Email'" [name]="'email'">
      <input 
        placeholder="Enter email"
        [formField]="loginForm.email"
        [pAutoFocus]="true"
        pInputText
        id="email"
        styleClass="full-width"/>
     </app-form-value-wrapper>
     <app-form-value-wrapper [label]="'Password'" [name]="'password'">
      <p-password 
        placeholder="Enter password"
        [formField]="loginForm.password"
        [toggleMask]="true"
        [feedback]="false"
        [attr.id]="'password'"
        styleClass="full-width">
      </p-password>
     </app-form-value-wrapper>
      <div class="mt-3">
        @let submitting = loginForm().submitting();
        <p-button 
          [loading]="submitting"
          [disabled]="submitting"
          [label]="submitting ? 'Logging in...' : 'Login'"
          [type]="'submit'"
          [rounded]="true"
          class="flex-auto"
          styleClass="w-full"/>
      </div>
    </form>
  </div>
</div>
