<p-card class="flex flex-column cursor-move w-full gap-2"> 
  <div class="flex justify-content-between align-items-center">
    <h4 id="title-{{task().id}}" class="m-0">{{task().title}}</h4>
    <p-badge [value]="task().taskPriority" [severity]="taskSeverityClass()" />
  </div>
  <p id="description-{{task().id}}" class="text-600">{{task().description}}</p>
  <div class="flex justify-content-between align-items-center">
    <p-avatar-group>
      @let users = task().users;
      @for (user of users | slice: 0 : maxVisibleImages; track user.id ) {
        @let fullName = user.fullName;
        <p-avatar [pTooltip]="fullName" [tooltipPosition]="'bottom'"  [label]="fullName | slice: 0:1" [shape]="'circle'" [size]="'normal'" />
      }
      @let length = users.length;
      @if (length > maxVisibleImages) {
        <p-avatar label="+ {{length - maxVisibleImages}}" [shape]="'circle'" [size]="'normal'" />
      }
    </p-avatar-group>
    <div class="h-2rem w-2rem surface-ground flex justify-content-center align-items-center cursor-pointer border-circle" (click)="menu.toggle($event)">
      <i class="pi pi-ellipsis-v" ></i>
    </div>
  </div>
</p-card>
<p-menu #menu [model]="items" [popup]="true" />
