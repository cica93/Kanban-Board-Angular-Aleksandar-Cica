@let state = tasks$ | async;
@if(state?.loading){
  <div class="fixed top-50 left-50  align-items-center justify-content-center">
  <p-progressSpinner />
</div>
}
<div class="flex my-1 mx-5 justify-content-between">
  <p-iconfield class="w-3" iconPosition="right">
    <input
      [placeholder]="loading() ? 'Searching...' : 'Search'"
      (appDebounceInput)="searchChange.next($event)"
      pInputText
      [pAutoFocus]="true"
      class="w-full"
    />
    <p-inputicon class="pi pi-search" style="transform: translateY(-2px);" />
  </p-iconfield>
    <p-button
      icon="pi pi-plus"
      (click)="navigateUserDialog()"
      [size]="'large'"
      [label]="'Create Task'"
    />
</div>

<div class="flex">
  @for (item of state?.data | groupAndSortTask ; track $index) {
  <div class="flex w-4 my-1 mx-3 flex-column">
    <div class="flex flex-row align-items-center justify-content-center gap-2">
      <h2 class="text-center">
        {{ item.key | replace : "_" : " " }}
      </h2>
    </div>
    <div 
      class="flex flex-column row-gap-4"
      cdkDropList
      [id]="item.key"
      [cdkDropListData]="item"
      [cdkDropListConnectedTo]="TASK_STATUSES"
      (cdkDropListDropped)="onDrop($event)">
      @for (task of item.value; track $index) {
        <app-task-card
          cdkDrag
          [cdkDragData]="task"
          [task]="task"
          (onDelete)="deleteTask(task)"
          (onEdit)="navigateUserDialog(task)"
        />
      }
    </div>
  </div>
  }
</div>
