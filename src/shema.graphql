type Query {
  getTaskById(id: ID!): Task!
  getTasks(
    page: number
    pageSize: number
    columns: [String!]
    order: String
    description: String
  ): [Task!]!
}

type Mutation {
  createTask(task: Task!): OptionalTask
  updateTask(id: ID!, task: Task!): OptionalTask
  patchTask(id: ID!, task: OptionalTask!): OptionalTask
  deleteTask(id: ID!, version: Int!): OptionalTask
  dragTask(task: DragTask!): OptionalTask
}

type User {
  id: ID!
  fullName: String!
  email: String!
}

type Task {
  id: ID
  title: String!
  description: String!
  taskStatus: String!
  taskPriority: String!
  version: Int!
  users: [User!]
}

type DragTask {
  taskId: ID
  taskOrder: String!
  taskStatus: String!
}

type OptionalTask {
  id: ID
  title: String
  description: String
  taskStatus: String
  taskPriority: String
  version: Int
  users: [User!]
}
